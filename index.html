<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Time tracking dashboard</title>
  <link rel="stylesheet" href="style.css">
 
</head>
<body>


  <main>

    <!-- profile section  -->
    <section class="pfp-section">
    <header>
      <img src="images/image-jeremy.png" alt="image-jeremy">
      <p>Report for</p>
      <h1>Jeremy Robson</h1>
    </header>

    <nav>
      <button>Daily</button>
      <button>Weekly</button>
      <button>Monthly</button>
    </nav>
    </section>

<section class="time-section">

  <!-- Work -->
  <article class="card work">
    <img src="images/icon-work.svg" alt="Work icon">

    <section>
      <header>
        <h4>Work</h4>
        <img src="images/icon-ellipsis.svg" alt="icon-ellipsis">
      </header>

      <h1>5hrs</h1>
      <p>Previous - 7hrs</p>
    </section>
  </article>

  <!-- Play -->
  <article class="card play">
    <img src="images/icon-play.svg" alt="Play icon">

    <section>
      <header>
        <h4>Play</h4>
        <img src="images/icon-ellipsis.svg" alt="icon-ellipsis">
      </header>

      <h1>1hr</h1>
      <p>Previous - 2hrs</p>
    </section>
  </article>

  <!-- Study -->
  <article class="card study">
    <img src="images/icon-study.svg" alt="Study icon">

    <section>
      <header>
        <h4>Study</h4>
        <img src="images/icon-ellipsis.svg" alt="icon-ellipsis">
      </header>

      <h1>0hrs</h1>
      <p>Previous - 1hr</p>
    </section>
  </article>

  <!-- Exercise -->
  <article class="card exercise">
    <img src="images/icon-exercise.svg" alt="Exercise icon">

    <section>
      <header>
        <h4>Exercise</h4>
        <img src="images/icon-ellipsis.svg" alt="icon-ellipsis">
      </header>

      <h1>1hr</h1>
      <p>Previous - 1hr</p>
    </section>
  </article>

  <!-- Social -->
  <article class="card social">
    <img src="images/icon-social.svg" alt="Social icon">

    <section>
      <header>
        <h4>Social</h4>
        <img src="images/icon-ellipsis.svg" alt="icon-ellipsis">
      </header>

      <h1>1hr</h1>
      <p>Previous - 3hrs</p>
    </section>
  </article>

  <!-- Self Care -->
  <article class="card self-care">
    <img src="images/icon-self-care.svg" alt="Self care icon">

    <section>
        <header>
          <h4>Self Care</h4>
          <img src="images/icon-ellipsis.svg" alt="icon-ellipsis">
        </header>

        <h1>0hrs</h1>
        <p>Previous - 1hr</p>
      </section>
    </article>

  </section>

  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
